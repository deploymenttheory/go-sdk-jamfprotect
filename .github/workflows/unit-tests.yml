name: go | Unit Tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/unit-tests.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  unit-tests:
    name: '🧪 Run Unit Tests'
    runs-on: ubuntu-24.04-arm
    if: github.event.pull_request.draft == false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true

      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Run Unit Tests
        run: |
          echo "::group::🧪 Unit Tests Setup"
          echo "========================================================================"
          echo "  Running Unit Tests with Coverage"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""

          go test -v -race -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v '/acceptance' | grep -v '/examples' | grep -v '/mocks') 2>&1 | tee test_output.txt

          echo ""
          echo "::group::📊 Coverage Summary"
          go tool cover -func=coverage.out | tail -1
          echo "::endgroup::"

      - name: Generate Test Statistics
        if: always()
        run: |
          echo "::group::📈 Test Statistics"
          echo "========================================================================"
          echo "  Unit Test Statistics by Service"
          echo "========================================================================"
          echo ""
          
          # Parse test output to count tests per service and save to temp file
          grep "^=== RUN" test_output.txt | awk '
          {
            # Extract service name from test name
            test_name = $3
            if (test_name ~ /^Test/) {
              # Extract service from path-like test names
              split(test_name, parts, "_")
              if (length(parts) > 1) {
                service = tolower(parts[1])
                service_tests[service]++
                total_tests++
              }
            }
          }
          END {
            # Output service counts for sorting
            for (service in service_tests) {
              printf "%s %d\n", service, service_tests[service]
            }
            # Output totals on stderr to preserve them
            printf "TOTAL_SERVICES:%d\n", length(service_tests) > "/dev/stderr"
            printf "TOTAL_TESTS:%d\n", total_tests > "/dev/stderr"
          }
          ' 2> test_stats_totals.txt | sort -k1,1 > test_stats_sorted.txt
          
          # Print header
          printf "%-50s %s\n" "Service" "Tests"
          printf "%-50s %s\n" "-------" "-----"
          
          # Print sorted services
          awk '{printf "%-50s %5d\n", $1, $2}' test_stats_sorted.txt
          
          # Print footer with totals
          echo ""
          printf "%-50s %s\n" "========================================" "====="
          grep "TOTAL_SERVICES:" test_stats_totals.txt | awk -F: '{printf "%-50s %5d\n", "Total Services with Tests:", $2}'
          grep "TOTAL_TESTS:" test_stats_totals.txt | awk -F: '{printf "%-50s %5d\n", "Total Unit Tests:", $2}'
          printf "%-50s %s\n" "========================================" "====="
          
          # Cleanup temp files
          rm -f test_output.txt test_stats_sorted.txt test_stats_totals.txt
          
          echo ""
          echo "::endgroup::"

      - name: Generate Coverage Report
        if: always()
        run: |
          echo "::group::📈 Detailed Coverage Report"
          go tool cover -func=coverage.out
          echo "::endgroup::"

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          slug: deploymenttheory/go-sdk-jamfprotect
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

      - name: Save artifacts
        if: failure()
        run: |
          mkdir -p wr_actions
          echo ${{ github.repository_owner }} > wr_actions/ghowner.txt
          echo ${{ github.event.repository.name }} > wr_actions/ghrepo.txt
          echo ${{ github.event.pull_request.number }} > wr_actions/prnumber.txt

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifact
          path: wr_actions

      - name: Get run url
        if: failure()
        run: |
          echo "gha_url=https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}" >> $GITHUB_ENV

      - name: Send build failure comment
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GHA_URL: ${{ env.gha_url }}
        with:
          result-encoding: string
          script: |
            const runUrl = process.env.GHA_URL;
            github.rest.issues.createComment({
              issue_number: ${{ github.event.pull_request.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `<b>🧪 Unit Test Failure</b> \n\n This pull request contains failing unit tests which need to be addressed [here](${runUrl}) .`
            })
